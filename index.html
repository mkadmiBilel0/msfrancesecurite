<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Website</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Poppins,sans-serif;
    background:linear-gradient(135deg,#0f172a,#1e3a8a);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    text-align:center;
    max-width:700px;
    padding:40px;
}

h1{
    font-size:55px;
    margin-bottom:20px;
}

p{
    font-size:20px;
    opacity:.9;
    margin-bottom:35px;
}

.btn{
    display:inline-block;
    padding:15px 35px;
    background:#3b82f6;
    color:white;
    text-decoration:none;
    border-radius:8px;
    transition:.3s;
}

.btn:hover{
    background:#2563eb;
}

footer{
    margin-top:60px;
    opacity:.7;
    font-size:14px;
}

</style>

</head>

<body>

<div class="container">

<h1>🚀 Welcome!</h1>

<p>
My website is successfully hosted using
<strong>GitHub Pages</strong>.
</p>

<a href="https://github.com" class="btn">
Visit GitHub
</a>

<footer>

© 2026 Your Company

</footer>

</div>

</body>
</html>
